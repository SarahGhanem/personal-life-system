databases:
  - name: personal-life-system-db
    databaseName: personal_life_system
    plan: starter
    region: oregon

services:
  - type: web
    name: personal-life-system
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run build
    startCommand: npm run start
    healthCheckPath: /login
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: personal-life-system-db
          property: connectionString
      # Render's own Postgres has no separate pooled/direct endpoint, so both
      # env vars point at the same connection string (DIRECT_URL is only used
      # by `prisma migrate`, kept distinct in case you move to a
      # pooled provider like Neon/Supabase later).
      - key: DIRECT_URL
        fromDatabase:
          name: personal-life-system-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      # Fill in after first deploy with the service's public URL, e.g.
      # https://personal-life-system.onrender.com (or your custom domain).
      - key: NEXTAUTH_URL
        sync: false
